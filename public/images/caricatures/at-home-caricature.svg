<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-athome" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4B5FD;stop-opacity:1" />
    </linearGradient>
    <filter id="glow-athome">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g filter="url(#glow-athome)">
    <!-- Silhouette apaisée -->
    <circle cx="100" cy="68" r="25" fill="url(#grad-athome)" opacity="0.95"/>
    
    <!-- Corps détendu -->
    <ellipse cx="100" cy="120" rx="28" ry="40" fill="url(#grad-athome)" opacity="0.9"/>
    
    <!-- Maison stylisée minimaliste -->
    <path d="M55 115 L55 100 L70 88 L85 100 L85 115 L70 127 Z" fill="white" opacity="0.7"/>
    <rect x="65" y="105" width="10" height="10" fill="url(#grad-athome)" opacity="0.4"/>
    <circle cx="70" cy="110" r="1.5" fill="white" opacity="0.9"/>
    
    <!-- Bras gauche détendu -->
    <circle cx="68" cy="110" r="5" fill="url(#grad-athome)"/>
    <line x1="68" y1="110" x2="58" y2="115" stroke="url(#grad-athome)" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Bras droit avec geste accueillant -->
    <circle cx="132" cy="110" r="5" fill="url(#grad-athome)"/>
    <line x1="132" y1="110" x2="148" y2="105" stroke="url(#grad-athome)" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Cœur de bien-être -->
    <path d="M148 90 Q148 85 145 83 Q142 85 142 90 Q142 95 145 98 Q148 95 148 90" 
          fill="white" opacity="0.8"/>
    
    <!-- Visage apaisé -->
    <ellipse cx="92" cy="68" rx="3" ry="4" fill="white"/>
    <ellipse cx="108" cy="68" rx="3" ry="4" fill="white"/>
    <path d="M90 78 Q100 83 110 78" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
