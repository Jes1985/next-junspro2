<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-projects" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow-projects">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Silhouette élégante et minimaliste -->
  <g filter="url(#glow-projects)">
    <!-- Tête stylisée -->
    <circle cx="100" cy="75" r="28" fill="url(#grad-projects)" opacity="0.95"/>
    
    <!-- Corps élégant -->
    <ellipse cx="100" cy="130" rx="32" ry="45" fill="url(#grad-projects)" opacity="0.9"/>
    
    <!-- Bras gauche avec concept créatif -->
    <circle cx="70" cy="115" r="6" fill="url(#grad-projects)"/>
    <line x1="70" y1="115" x2="55" y2="105" stroke="url(#grad-projects)" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Élément créatif - bulle d'idée -->
    <circle cx="50" cy="100" r="12" fill="white" opacity="0.9"/>
    <path d="M50 95 L50 90 M50 105 L50 110 M45 100 L40 100 M55 100 L60 100" 
          stroke="url(#grad-projects)" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Bras droit avec tablette stylisée -->
    <circle cx="130" cy="115" r="6" fill="url(#grad-projects)"/>
    <line x1="130" y1="115" x2="145" y2="110" stroke="url(#grad-projects)" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Tablette moderne -->
    <rect x="145" y="105" width="18" height="12" rx="2" fill="white" opacity="0.95"/>
    <line x1="149" y1="109" x2="159" y2="109" stroke="url(#grad-projects)" stroke-width="1" opacity="0.6"/>
    <line x1="149" y1="113" x2="159" y2="113" stroke="url(#grad-projects)" stroke-width="1" opacity="0.6"/>
    
    <!-- Détails visage minimalistes -->
    <circle cx="92" cy="75" r="3" fill="white"/>
    <circle cx="108" cy="75" r="3" fill="white"/>
    <path d="M90 85 Q100 90 110 85" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
