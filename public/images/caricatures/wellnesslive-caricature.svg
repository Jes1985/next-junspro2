<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-wellness" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow-wellness">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g filter="url(#glow-wellness)">
    <!-- Silhouette énergique -->
    <circle cx="100" cy="70" r="24" fill="url(#grad-wellness)" opacity="0.95"/>
    
    <!-- Corps en mouvement dynamique -->
    <ellipse cx="100" cy="120" rx="26" ry="38" fill="url(#grad-wellness)" opacity="0.9"/>
    
    <!-- Bras en mouvement -->
    <circle cx="68" cy="108" r="7" fill="url(#grad-wellness)"/>
    <line x1="68" y1="108" x2="52" y2="95" stroke="url(#grad-wellness)" stroke-width="6" stroke-linecap="round"/>
    
    <circle cx="132" cy="108" r="7" fill="url(#grad-wellness)"/>
    <line x1="132" y1="108" x2="148" y2="95" stroke="url(#grad-wellness)" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Jambes en mouvement -->
    <circle cx="88" cy="148" r="6" fill="url(#grad-wellness)"/>
    <line x1="88" y1="148" x2="78" y2="168" stroke="url(#grad-wellness)" stroke-width="5" stroke-linecap="round"/>
    
    <circle cx="112" cy="148" r="6" fill="url(#grad-wellness)"/>
    <line x1="112" y1="148" x2="122" y2="168" stroke="url(#grad-wellness)" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Ondes d'énergie subtiles -->
    <circle cx="100" cy="95" r="40" fill="none" stroke="url(#grad-wellness)" stroke-width="1.5" opacity="0.25" stroke-dasharray="4,4"/>
    <circle cx="100" cy="95" r="50" fill="none" stroke="url(#grad-wellness)" stroke-width="1" opacity="0.15" stroke-dasharray="3,3"/>
    
    <!-- Visage énergique -->
    <circle cx="92" cy="70" r="3.5" fill="white"/>
    <circle cx="108" cy="70" r="3.5" fill="white"/>
    <path d="M88 80 Q100 86 112 80" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
